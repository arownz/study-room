kind = "web"
previewPath = "/"
title = "StudyAI — Collaborative Study Workspace"
version = "1.0.0"
id = "artifacts/study-workspace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21654

[services.development]
run = "pnpm --filter @workspace/study-workspace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-workspace", "run", "build" ]
publicDir = "artifacts/study-workspace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21654"
BASE_PATH = "/"
