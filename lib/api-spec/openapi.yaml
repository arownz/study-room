openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api/v1
    description: Versioned API base path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: protected
    description: Protected route examples
  - name: notes
    description: Notes CRUD operations
  - name: studyRooms
    description: Study room CRUD operations
  - name: flashcards
    description: Flashcards CRUD operations
  - name: flashcardDecks
    description: Flashcard deck CRUD and stats
  - name: users
    description: User profile and uploads
  - name: pomodoro
    description: Pomodoro session logging
  - name: ai
    description: AI tutor threads and jobs
  - name: collaboration
    description: Collaboration sessions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/me:
    get:
      operationId: getCurrentAuthSession
      tags: [auth]
      summary: Current auth session
      description: Returns authenticated user and session metadata.
      responses:
        "200":
          description: Auth session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /protected/dashboard:
    get:
      operationId: getProtectedDashboard
